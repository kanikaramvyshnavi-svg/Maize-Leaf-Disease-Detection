<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .box {
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }
        a {
            color: yellow;
            font-size: 20px;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>Welcome to Home Page</h1>
        <p>You have successfully logged in!</p>

        <a href="/logout">Logout</a>
    </div>
</body>
</html>
