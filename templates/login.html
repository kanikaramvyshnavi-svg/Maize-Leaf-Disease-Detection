<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
        <body style="
            margin:0;
            padding:0;
            height:100vh;
            background-image: url('{{ url_for('static', filename='maize1.jpg') }}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        ">
        }

        .container {
            width: 330px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.85); /* Transparent box */
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #aaa;
        }

        button {
            background: #2575fc;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        a {
            text-decoration: none;
            color: #2575fc;
            font-weight: bold;
        }

        .error {
            color: red;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Login</h2>

        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Enter Username" required>
            <input type="password" name="password" placeholder="Enter Password" required>
            <button type="submit">Login</button>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <p>Don't have an account? <a href="/signup">Signup</a></p>
    </div>
</body>
</html>
