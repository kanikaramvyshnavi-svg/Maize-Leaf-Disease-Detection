<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
        }
        .container {
            width: 350px;
            margin: 80px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px #999;
            text-align: center;
        }

        input[type=file] {
            width: 100%;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        img {
            width: 200px;
            margin-top: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Image Prediction Page</h2>

        <!-- File upload form -->
        <form action="/home" method="POST" enctype="multipart/form-data">
            <input type="file" name="image" required>
            <button type="submit">Upload & Predict</button>
        </form>

        {% if filename %}
            <h3>Uploaded Image:</h3>
            <img src="{{ url_for('static', filename='uploads/' + filename) }}">
        {% endif %}

        {% if label %}
            <h3>Prediction: {{ label }}</h3>
            <h3>Solution / Treatment:</h3>
    <pre style="white-space: pre-wrap; background:#f7f7f7; padding:15px; border-radius:8px;">
{{ solution }}
    </pre>
        {% endif %}
    </div>

</body>
</html>
